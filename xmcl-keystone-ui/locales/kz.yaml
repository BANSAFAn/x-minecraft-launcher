  instance:
    iconDescription: Таңбашаны өзгерту үшін басыңыз.
    iconTitle: Инстанция таңбашасы
    javaDescription: Java нұсқасын таңдау немесе ауыстыру.
    javaImportDescription: Жергіліктен Java импорттау.
    javaImportTitle: Java импорттау
    javaTitle: Java тізімі
  instanceAddDescription: >-
    Бар болып тұрған Minecraft инстанциясын импорттау немесе түпкіден немесе модпакеттен жаңа инстанция жасау үшін бұл түймені басыңыз.
  instanceSelectDescription: Бұл түймені басу ойын таңдау және жаңалықтарды оқу бетіне өтуге мүмкіндік береді.
  launchDescription: Ойынды орнату немесе жөнелту үшін бұл түймені басыңыз.
  mod:
    defaultSourceDescription: >-
      Модтар туралы ақпарат көзін осы жерден таңдай аласыз. Бұл Modrinth және Curseforge-қа жарияланған модтар. Егер сіз бұл екі мазмұн қамтамаушы арасында ауыстырғыңыз келсе, осы жерден мәнін өзгерте аласыз.
    defaultSourceTitle: Мод мазмұн көзін таңдау
    detailDescription: >-
      Сол жақта элемент таңдағанда, мод туралы егжей-тегжейлерді көресіз. Мазмұн Modrinth, Curseforge немесе модтың мазмұнынан алынуы мүмкін.
    detailTitle: Мод егжей-тегжейі
    listDescription: >-
      Енгізім болмаса, орнатылған модтарды көрсетеміз. Енгізімде кілт сөз немесе санат таңдалса, ізделген модтарды көресіз.
    listTitle: Орнатылған немесе ізделетін мод
    searchDescription: >-
      Бұл іздеу жолағымен Modrinth, Curseforge немесе жергілік кэшіңізден модтар іздей аласыз.
    searchTitle: Модтар іздеу
  multiplayer:
    contentDescription: Сіз бен қатысушылар арасындағы байланыстар осы жерде тізіледі.
    contentTitle: '@:multiplayer.connections'
    groupDescription: >-
      Сіз басқа ойыншылармен топ құра немесе топқа қосыла аласыз. Жөнелткіш сіз бен достарыңыз арасында P2P байланыстарын топқа сәйкес жасауға тырысады. Достарыңыз берген топ атауын енгізе аласыз. Немесе сіз өзіңіз таңдауыңызға болады.
    groupTitle: Топқа қосылу
    joinDescription: >-
      Топ атауын енгізген соң, бұл түймені басып топқа қосыла немесе жасай аласыз. Егер топ атауы бос болса, жөнелткіш сіз үшін атау жасайды.
    manualDescription: >-
      Егер сіз немесе достарыңыз топқа қосыла алмасаңыз, қолмен қосылу арқылы таңбаны қолмен алмасуға тырыссаңыз болады. Егер ол да сәтсіз болса, бұл интернет мәселесі болуы мүмкін.
  recentPlayDescription: >-
    Жасалған ойындар осы жерде тізіледі. Орнатылған нұсқалар мен жүктелген модпакеттерді көру үшін көріністерді ауыстыра аласыз.
  storePoupularModpackDescription: >-
    Бұл бөлімде Curseforge және Modrinth ішінде ең танымал модпакеттерді көресіз.
  storeSearchCategoryDescription: Санаттарды немесе сүзгілерді осы жерден ауыстыра аласыз.
  storeSearchDescription: >-
    Бұл мәтін өрісіне енгізу арқылы модпакеттерді іздей аласыз. Іздеу үшін Enter басыңыз.
  storeSearchResultDescription: Барлық іздеу нәтижелерін осы жерде көресіз.
  userAccountDescription: Бұл таңбашаны басып, Minecraft тіркелгіңізді қосыңыз немесе басқарыңыз.
